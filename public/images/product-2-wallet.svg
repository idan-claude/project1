<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#FDF8F3"/>
      <stop offset="100%" stop-color="#EDE4D8"/>
    </radialGradient>
    <linearGradient id="leather" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0724A"/>
      <stop offset="50%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B4428"/>
    </linearGradient>
    <linearGradient id="leatherInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C49A6C"/>
      <stop offset="100%" stop-color="#A07040"/>
    </linearGradient>
    <linearGradient id="cardBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2C2E"/>
      <stop offset="50%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
    <radialGradient id="hlBlack" cx="28%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="30%" stop-color="#FCD34D"/>
      <stop offset="65%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="cardGray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B0B0B4"/>
      <stop offset="100%" stop-color="#6A6A70"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B4ADE"/>
      <stop offset="100%" stop-color="#1A2080"/>
    </linearGradient>
    <pattern id="tex2" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.6" fill="white" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="800" height="800" fill="url(#bg2)"/>
  <!-- Ambient warm glow -->
  <ellipse cx="400" cy="420" rx="320" ry="260" fill="white" opacity="0.30"/>

  <!-- Ground shadow -->
  <ellipse cx="400" cy="720" rx="260" ry="16" fill="black" opacity="0.09"/>

  <!-- WALLET BODY -->
  <!-- Wallet shadow (no blur) -->
  <rect x="146" y="212" width="508" height="492" rx="32" fill="black" opacity="0.10" transform="translate(16, 18)"/>
  <!-- Outer wallet -->
  <rect x="146" y="212" width="508" height="492" rx="32" fill="url(#leather)"/>
  <!-- Inner wallet lighter area -->
  <rect x="168" y="234" width="464" height="448" rx="24" fill="url(#leatherInner)"/>
  <!-- Card slot area -->
  <rect x="168" y="234" width="464" height="220" rx="20" fill="#7A5030" opacity="0.35"/>
  <!-- Wallet fold line -->
  <line x1="146" y1="456" x2="654" y2="456" stroke="#6B4428" stroke-width="3" opacity="0.5"/>
  <!-- Stitch pattern top -->
  <rect x="158" y="224" width="484" height="8" rx="4" fill="#C49A6C" opacity="0.40"/>
  <!-- Stitch pattern bottom -->
  <rect x="158" y="692" width="484" height="8" rx="4" fill="#C49A6C" opacity="0.40"/>

  <!-- CARD SLOT DETAILS (back cards peeking) -->
  <!-- Gray card peeking (back) - visible above wallet top -->
  <rect x="195" y="125" width="410" height="258" rx="20" fill="url(#cardGray)" opacity="0.90"/>
  <rect x="195" y="125" width="410" height="6" rx="3" fill="white" opacity="0.18"/>
  <rect x="220" y="162" width="44" height="34" rx="5" fill="#888" opacity="0.8"/>

  <!-- Blue card (middle) -->
  <rect x="183" y="110" width="434" height="272" rx="22" fill="url(#cardBlue)" opacity="0.92"/>
  <rect x="183" y="110" width="434" height="6" rx="3" fill="white" opacity="0.16"/>
  <rect x="210" y="148" width="44" height="34" rx="5" fill="#4A5AEE" opacity="0.8"/>
  <!-- Blue card NFC rings -->
  <circle cx="573" cy="132" r="12" fill="none" stroke="white" stroke-width="1.8" opacity="0.22"/>
  <circle cx="573" cy="132" r="20" fill="none" stroke="white" stroke-width="1.5" opacity="0.14"/>

  <!-- BLACK FINDCARD (front, prominent) -->
  <rect x="164" y="88" width="472" height="296" rx="24" fill="black" opacity="0.10" transform="translate(18, 22)"/>
  <rect x="164" y="88" width="472" height="296" rx="24" fill="url(#cardBlack)"/>
  <rect x="164" y="88" width="472" height="296" rx="24" fill="url(#tex2)"/>
  <rect x="164" y="88" width="472" height="296" rx="24" fill="url(#hlBlack)"/>
  <!-- Top sheen -->
  <rect x="164" y="88" width="472" height="6" rx="3" fill="white" opacity="0.18"/>
  <!-- Left edge -->
  <rect x="164" y="94" width="2.5" height="284" fill="white" opacity="0.07"/>

  <!-- Chip -->
  <rect x="190" y="132" width="54" height="42" rx="7" fill="url(#chip2)"/>
  <line x1="190" y1="146" x2="244" y2="146" stroke="#92400E" stroke-width="1.1" opacity="0.5"/>
  <line x1="190" y1="160" x2="244" y2="160" stroke="#92400E" stroke-width="1.1" opacity="0.5"/>
  <line x1="207" y1="132" x2="207" y2="174" stroke="#92400E" stroke-width="1.1" opacity="0.5"/>
  <line x1="222" y1="132" x2="222" y2="174" stroke="#92400E" stroke-width="1.1" opacity="0.5"/>

  <!-- NFC rings -->
  <circle cx="588" cy="110" r="13" fill="none" stroke="white" stroke-width="2.5" opacity="0.28"/>
  <circle cx="588" cy="110" r="22" fill="none" stroke="white" stroke-width="2" opacity="0.18"/>
  <circle cx="588" cy="110" r="32" fill="none" stroke="white" stroke-width="1.5" opacity="0.10"/>

  <!-- Card number dots -->
  <circle cx="240" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="258" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="276" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="294" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="324" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="342" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="360" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="378" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="408" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="426" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="444" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="462" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="492" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="510" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="528" cy="238" r="4.5" fill="white" opacity="0.22"/>
  <circle cx="546" cy="238" r="4.5" fill="white" opacity="0.22"/>

  <!-- Separator line -->
  <line x1="186" y1="290" x2="620" y2="290" stroke="white" stroke-width="0.6" opacity="0.12"/>

  <!-- Brand text — large, readable -->
  <text x="190" y="336" font-family="'Arial Black', Arial, sans-serif" font-size="34" font-weight="900" fill="white" opacity="0.92" direction="ltr">FindCard</text>
  <!-- PRO badge -->
  <rect x="380" y="317" width="46" height="22" rx="11" fill="white" opacity="0.16"/>
  <text x="403" y="333" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="white" opacity="0.88" text-anchor="middle" direction="ltr">PRO</text>
</svg>
