<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5F3EE"/>
      <stop offset="100%" stop-color="#E8E3D8"/>
    </linearGradient>
    <linearGradient id="walletMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B6A3E"/>
      <stop offset="40%" stop-color="#704F28"/>
      <stop offset="100%" stop-color="#4E3318"/>
    </linearGradient>
    <linearGradient id="walletFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A07840"/>
      <stop offset="100%" stop-color="#6B4E24"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2C30"/>
      <stop offset="60%" stop-color="#141416"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
    <linearGradient id="cardShine2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chip2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="50%" stop-color="#C8960A"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
  </defs>

  <rect width="900" height="900" fill="url(#bg2)"/>
  <ellipse cx="450" cy="450" rx="300" ry="200" fill="white" opacity="0.35"/>

  <!-- Wallet shadow -->
  <rect x="218" y="338" width="464" height="310" rx="22" fill="#000" opacity="0.10" transform="translate(0,14)"/>
  <rect x="218" y="338" width="464" height="310" rx="22" fill="#000" opacity="0.07" transform="translate(0,7)"/>

  <!-- Wallet body -->
  <rect x="218" y="338" width="464" height="310" rx="22" fill="url(#walletMain)"/>
  <rect x="218" y="338" width="464" height="220" rx="22" fill="url(#walletFace)"/>
  <!-- Leather texture dots -->
  <g fill="#5A3A15" opacity="0.18">
    <circle cx="248" cy="369" r="2.5"/><circle cx="278" cy="369" r="2.5"/><circle cx="308" cy="369" r="2.5"/>
    <circle cx="338" cy="369" r="2.5"/><circle cx="368" cy="369" r="2.5"/><circle cx="398" cy="369" r="2.5"/>
    <circle cx="428" cy="369" r="2.5"/><circle cx="458" cy="369" r="2.5"/><circle cx="488" cy="369" r="2.5"/>
    <circle cx="518" cy="369" r="2.5"/><circle cx="548" cy="369" r="2.5"/><circle cx="578" cy="369" r="2.5"/>
    <circle cx="263" cy="387" r="2.5"/><circle cx="293" cy="387" r="2.5"/><circle cx="323" cy="387" r="2.5"/>
    <circle cx="353" cy="387" r="2.5"/><circle cx="383" cy="387" r="2.5"/><circle cx="413" cy="387" r="2.5"/>
    <circle cx="443" cy="387" r="2.5"/><circle cx="473" cy="387" r="2.5"/><circle cx="503" cy="387" r="2.5"/>
  </g>
  <!-- Wallet stitch border -->
  <rect x="226" y="346" width="448" height="294" rx="18" fill="none" stroke="#C89040" stroke-width="1.8" stroke-dasharray="6 4" opacity="0.45"/>
  <!-- Wallet clasp -->
  <circle cx="450" cy="648" r="14" fill="#C89040"/>
  <circle cx="450" cy="648" r="10" fill="#A87020"/>
  <circle cx="450" cy="648" r="5" fill="#C89040"/>

  <!-- Card protruding from wallet -->
  <g transform="translate(450 368) rotate(2)">
    <!-- Card shadow -->
    <rect x="-220" y="-148" width="440" height="280" rx="22" fill="#000" opacity="0.18" transform="translate(4,6)"/>
    <!-- Card body -->
    <rect x="-220" y="-148" width="440" height="280" rx="22" fill="url(#card2)"/>
    <rect x="-220" y="-148" width="440" height="280" rx="22" fill="url(#cardShine2)"/>
    <rect x="-220" y="-148" width="440" height="5" rx="2.5" fill="white" opacity="0.18"/>

    <!-- Chip -->
    <rect x="-155" y="-72" width="52" height="42" rx="7" fill="url(#chip2)"/>
    <line x1="-155" y1="-60" x2="-103" y2="-60" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-155" y1="-48" x2="-103" y2="-48" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-136" y1="-72" x2="-136" y2="-30" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-122" y1="-72" x2="-122" y2="-30" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>

    <!-- NFC arcs -->
    <g fill="none" stroke="white" stroke-linecap="round">
      <path d="M100,-35 A35,35 0 0,1 140,-35" stroke-width="3.5" opacity="0.5"/>
      <path d="M108,-22 A22,22 0 0,1 132,-22" stroke-width="3" opacity="0.65"/>
      <path d="M115,-10 A10,10 0 0,1 125,-10" stroke-width="2.5" opacity="0.8"/>
      <circle cx="120" cy="-3" r="3.5" fill="white" opacity="0.8"/>
    </g>

    <!-- Dots -->
    <g fill="white" opacity="0.3">
      <circle cx="-155" cy="50" r="3.5"/><circle cx="-145" cy="50" r="3.5"/><circle cx="-135" cy="50" r="3.5"/><circle cx="-125" cy="50" r="3.5"/>
      <circle cx="-90" cy="50" r="3.5"/><circle cx="-80" cy="50" r="3.5"/><circle cx="-70" cy="50" r="3.5"/><circle cx="-60" cy="50" r="3.5"/>
    </g>

    <!-- FC logo -->
    <circle cx="170" cy="95" r="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.35"/>
    <text x="170" y="100" font-family="Arial" font-size="10" font-weight="700" fill="white" opacity="0.7" text-anchor="middle">FC</text>
  </g>

  <text x="450" y="800" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#3D2B10" text-anchor="middle" opacity="0.85">FindCard PRO בתוך הארנק שלך</text>
  <text x="450" y="824" font-family="Arial, sans-serif" font-size="13" fill="#888" text-anchor="middle">עובי 1.8 מ״מ — נכנס לכל ארנק</text>
</svg>
