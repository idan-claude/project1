<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 504" width="800" height="504">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#EDE9E2"/>
    </linearGradient>
    <linearGradient id="card2" x1="8%" y1="5%" x2="92%" y2="95%">
      <stop offset="0%" stop-color="#1C2C48"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0C1320"/>
    </linearGradient>
    <radialGradient id="shine2" cx="78%" cy="12%" r="45%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topGlow2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="12%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wallet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B0E"/>
      <stop offset="50%" stop-color="#1E1208"/>
      <stop offset="100%" stop-color="#120B04"/>
    </linearGradient>
    <radialGradient id="walletShine" cx="25%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#4A2F1A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#120B04" stop-opacity="1"/>
    </radialGradient>
    <filter id="wSh" x="-15%" y="-12%" width="130%" height="138%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16" result="b"/>
      <feOffset in="b" dx="4" dy="16" result="o"/>
      <feColorMatrix type="matrix" in="o" values="0 0 0 0 0.05 0 0 0 0 0.03 0 0 0 0 0.01 0 0 0 0.38 0" result="c"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cSh2" x="-15%" y="-25%" width="130%" height="155%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="b"/>
      <feOffset in="b" dx="0" dy="-5" result="o"/>
      <feColorMatrix type="matrix" in="o" values="0 0 0 0 0.04 0 0 0 0 0.08 0 0 0 0 0.18 0 0 0 0.28 0" result="c"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="504" fill="url(#bg2)"/>
  <ellipse cx="150" cy="120" rx="170" ry="110" fill="#D6CEC0" opacity="0.18"/>
  <ellipse cx="650" cy="380" rx="150" ry="95" fill="#D6CEC0" opacity="0.15"/>

  <!-- Card (rendered first — bottom will be covered by wallet) -->
  <g filter="url(#cSh2)">
    <rect x="190" y="56" width="420" height="264" rx="20" fill="url(#card2)"/>
    <rect x="190" y="56" width="420" height="264" rx="20" fill="url(#topGlow2)"/>
    <rect x="190" y="56" width="420" height="264" rx="20" fill="url(#shine2)"/>

    <!-- LED -->
    <circle cx="590" cy="86" r="7" fill="#38BDF8" opacity="0.55"/>
    <circle cx="590" cy="86" r="3" fill="#38BDF8"/>

    <!-- Top label -->
    <text x="208" y="78" font-family="Arial,sans-serif" font-size="9" font-weight="500" fill="white" opacity="0.32" letter-spacing="2.5">FINDCARD PRO</text>

    <!-- Logo visible top portion -->
    <text x="400" y="188" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="48" fill="#7DD3FC" letter-spacing="-1" text-anchor="middle">Find</text>
    <text x="400" y="242" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="48" fill="#F1F5F9" letter-spacing="-1" text-anchor="middle">Card</text>

    <text x="400" y="276" font-family="Arial,sans-serif" font-size="10" fill="white" opacity="0.38" text-anchor="middle">Works with Apple Find My</text>
    <text x="400" y="310" font-family="Arial,sans-serif" font-size="8.5" fill="white" opacity="0.20" text-anchor="middle">IP67  ·  1.8mm  ·  Qi  ·  Bluetooth 5.1</text>
  </g>

  <!-- Wallet (covers bottom of card) -->
  <g filter="url(#wSh)">
    <rect x="176" y="248" width="448" height="198" rx="16" fill="url(#walletShine)"/>
    <!-- Stitching -->
    <rect x="185" y="257" width="430" height="180" rx="11" fill="none" stroke="#3D2510" stroke-width="1.5" stroke-dasharray="7,5"/>
    <!-- Card slot opening -->
    <rect x="190" y="241" width="420" height="18" rx="5" fill="#0A0603"/>
    <rect x="190" y="251" width="420" height="5" fill="black" opacity="0.22"/>
    <!-- Leather grain lines -->
    <line x1="186" y1="290" x2="614" y2="290" stroke="#3D2510" stroke-width="0.6" opacity="0.35"/>
    <line x1="186" y1="316" x2="614" y2="316" stroke="#3D2510" stroke-width="0.6" opacity="0.28"/>
    <line x1="186" y1="342" x2="614" y2="342" stroke="#3D2510" stroke-width="0.6" opacity="0.22"/>
    <line x1="186" y1="368" x2="614" y2="368" stroke="#3D2510" stroke-width="0.6" opacity="0.18"/>
    <line x1="186" y1="394" x2="614" y2="394" stroke="#3D2510" stroke-width="0.6" opacity="0.14"/>
    <!-- Edge highlight -->
    <rect x="176" y="248" width="3" height="198" rx="2" fill="white" opacity="0.04"/>
  </g>

  <text x="400" y="476" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="17" fill="#374151" text-anchor="middle">דק 1.8מ&quot;מ — נכנס לכל ארנק</text>
</svg>
