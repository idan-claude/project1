<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="p2bg" cx="50%" cy="46%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EAF0"/>
    </radialGradient>
    <linearGradient id="p2wallet" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#4A3728"/>
      <stop offset="40%" stop-color="#3A2A1E"/>
      <stop offset="100%" stop-color="#271C13"/>
    </linearGradient>
    <linearGradient id="p2walletTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B4C36"/>
      <stop offset="100%" stop-color="#4A3728"/>
    </linearGradient>
    <linearGradient id="p2card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2D"/>
      <stop offset="40%" stop-color="#1A1A1D"/>
      <stop offset="100%" stop-color="#0C0C0E"/>
    </linearGradient>
    <radialGradient id="p2gloss" cx="20%" cy="12%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="p2shadow" x="-25%" y="-25%" width="150%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
      <feOffset dx="0" dy="22" in="blur" result="ob"/>
      <feComponentTransfer in="ob" result="s">
        <feFuncA type="linear" slope="0.45"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="p2walletShadow" x="-20%" y="-15%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24" result="blur"/>
      <feOffset dx="4" dy="32" in="blur" result="ob"/>
      <feComponentTransfer in="ob" result="s">
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="p2leather" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="none"/>
      <circle cx="6" cy="6" r="1.2" fill="black" opacity="0.08"/>
    </pattern>
    <linearGradient id="p2chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E27A"/>
      <stop offset="50%" stop-color="#C4940F"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#p2bg)"/>
  <ellipse cx="400" cy="400" rx="260" ry="200" fill="white" opacity="0.32"/>

  <!-- Wallet body -->
  <g filter="url(#p2walletShadow)">
    <rect x="178" y="320" width="444" height="280" rx="22" fill="url(#p2wallet)"/>
    <rect x="178" y="320" width="444" height="280" rx="22" fill="url(#p2leather)" opacity="0.55"/>
    <rect x="178" y="320" width="444" height="50" rx="22" fill="url(#p2walletTop)"/>
    <rect x="178" y="350" width="444" height="20" fill="url(#p2walletTop)"/>
    <rect x="192" y="332" width="416" height="1.5" fill="none" stroke="#9B7A5A" stroke-width="1" stroke-dasharray="8 4" opacity="0.50"/>
    <rect x="192" y="588" width="416" height="1.5" fill="none" stroke="#9B7A5A" stroke-width="1" stroke-dasharray="8 4" opacity="0.40"/>
    <rect x="192" y="448" width="416" height="2" fill="black" opacity="0.22"/>
    <line x1="192" y1="340" x2="192" y2="588" stroke="#9B7A5A" stroke-width="1" stroke-dasharray="8 4" opacity="0.30"/>
    <line x1="608" y1="340" x2="608" y2="588" stroke="#9B7A5A" stroke-width="1" stroke-dasharray="8 4" opacity="0.30"/>
    <rect x="222" y="458" width="356" height="122" rx="10" fill="#2E2E32" opacity="0.65"/>
    <rect x="222" y="458" width="356" height="4" rx="2" fill="white" opacity="0.06"/>
  </g>

  <!-- FindCard card protruding -->
  <g filter="url(#p2shadow)" transform="translate(400, 362) rotate(-3)">
    <rect x="-222" y="-148" width="444" height="278" rx="22" fill="url(#p2card)"/>
    <rect x="-222" y="-148" width="444" height="278" rx="22" fill="url(#p2gloss)"/>
    <rect x="-222" y="-148" width="444" height="5" rx="2.5" fill="white" opacity="0.22"/>
    <rect x="-222" y="-143" width="2" height="268" rx="1" fill="white" opacity="0.09"/>
    <rect x="-200" y="-100" width="48" height="38" rx="6" fill="url(#p2chip)"/>
    <rect x="-200" y="-88" width="48" height="1.1" fill="#7A4F00" opacity="0.50"/>
    <rect x="-200" y="-77" width="48" height="1.1" fill="#7A4F00" opacity="0.50"/>
    <rect x="-186" y="-100" width="1.1" height="38" fill="#7A4F00" opacity="0.50"/>
    <rect x="-174" y="-100" width="1.1" height="38" fill="#7A4F00" opacity="0.50"/>
    <path d="M160 -108 Q169 -98 160 -88" stroke="white" stroke-width="2" fill="none" opacity="0.18"/>
    <path d="M169 -119 Q184 -98 169 -77" stroke="white" stroke-width="1.6" fill="none" opacity="0.12"/>
    <path d="M178 -130 Q200 -98 178 -66" stroke="white" stroke-width="1.2" fill="none" opacity="0.07"/>
    <circle cx="170" cy="92" r="14" fill="#1D4ED8" opacity="0.78"/>
    <text x="170" y="97"
          font-family="'Arial Black', Arial, sans-serif"
          font-size="9" font-weight="900"
          fill="white" text-anchor="middle"
          direction="ltr" opacity="0.96">FC</text>
  </g>

  <ellipse cx="400" cy="672" rx="175" ry="11" fill="black" opacity="0.09"/>
</svg>
