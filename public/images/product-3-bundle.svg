<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181A22"/>
      <stop offset="100%" stop-color="#0C0E14"/>
    </linearGradient>
    <linearGradient id="cardL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#28282C"/>
      <stop offset="100%" stop-color="#101012"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#323236"/>
      <stop offset="100%" stop-color="#18181A"/>
    </linearGradient>
    <linearGradient id="cardR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#28282C"/>
      <stop offset="100%" stop-color="#101012"/>
    </linearGradient>
    <linearGradient id="chip3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="50%" stop-color="#C8960A"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
    <linearGradient id="shine3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4060FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4060FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="900" fill="url(#bg3)"/>
  <!-- Center glow -->
  <ellipse cx="450" cy="450" rx="320" ry="220" fill="url(#glow3)"/>

  <!-- Left card (-22°) -->
  <g transform="translate(300 455) rotate(-22)">
    <rect x="-210" y="-133" width="420" height="266" rx="22" fill="#000" opacity="0.4" transform="translate(6,10)"/>
    <rect x="-210" y="-133" width="420" height="266" rx="22" fill="url(#cardL)"/>
    <rect x="-210" y="-133" width="420" height="266" rx="22" fill="url(#shine3)"/>
    <rect x="-210" y="-133" width="420" height="5" rx="2.5" fill="white" opacity="0.14"/>
    <rect x="-148" y="-65" width="44" height="36" rx="6" fill="url(#chip3)" opacity="0.85"/>
    <g fill="none" stroke="white" stroke-linecap="round" opacity="0.5">
      <path d="M80,-28 A28,28 0 0,1 110,-28" stroke-width="3"/>
      <path d="M87,-17 A18,18 0 0,1 103,-17" stroke-width="2.5"/>
      <circle cx="95" cy="-8" r="3" fill="white"/>
    </g>
    <g fill="white" opacity="0.22">
      <circle cx="-148" cy="48" r="3"/><circle cx="-138" cy="48" r="3"/><circle cx="-128" cy="48" r="3"/><circle cx="-118" cy="48" r="3"/>
    </g>
  </g>

  <!-- Right card (+22°) -->
  <g transform="translate(600 455) rotate(22)">
    <rect x="-210" y="-133" width="420" height="266" rx="22" fill="#000" opacity="0.4" transform="translate(6,10)"/>
    <rect x="-210" y="-133" width="420" height="266" rx="22" fill="url(#cardR)"/>
    <rect x="-210" y="-133" width="420" height="266" rx="22" fill="url(#shine3)"/>
    <rect x="-210" y="-133" width="420" height="5" rx="2.5" fill="white" opacity="0.14"/>
    <rect x="-148" y="-65" width="44" height="36" rx="6" fill="url(#chip3)" opacity="0.85"/>
    <g fill="none" stroke="white" stroke-linecap="round" opacity="0.5">
      <path d="M80,-28 A28,28 0 0,1 110,-28" stroke-width="3"/>
      <path d="M87,-17 A18,18 0 0,1 103,-17" stroke-width="2.5"/>
      <circle cx="95" cy="-8" r="3" fill="white"/>
    </g>
    <g fill="white" opacity="0.22">
      <circle cx="-148" cy="48" r="3"/><circle cx="-138" cy="48" r="3"/><circle cx="-128" cy="48" r="3"/><circle cx="-118" cy="48" r="3"/>
    </g>
  </g>

  <!-- Center card (front) -->
  <g transform="translate(450 445) rotate(0)">
    <rect x="-218" y="-138" width="436" height="276" rx="24" fill="#000" opacity="0.35" transform="translate(5,10)"/>
    <rect x="-218" y="-138" width="436" height="276" rx="24" fill="url(#cardC)"/>
    <rect x="-218" y="-138" width="436" height="276" rx="24" fill="url(#shine3)"/>
    <rect x="-218" y="-138" width="436" height="6" rx="3" fill="white" opacity="0.16"/>
    <!-- Chip -->
    <rect x="-155" y="-72" width="52" height="42" rx="7" fill="url(#chip3)"/>
    <line x1="-155" y1="-60" x2="-103" y2="-60" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-155" y1="-48" x2="-103" y2="-48" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-136" y1="-72" x2="-136" y2="-30" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-122" y1="-72" x2="-122" y2="-30" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <!-- NFC -->
    <g fill="none" stroke="white" stroke-linecap="round">
      <path d="M100,-40 A40,40 0 0,1 148,-40" stroke-width="4" opacity="0.5"/>
      <path d="M110,-26 A26,26 0 0,1 138,-26" stroke-width="3.5" opacity="0.65"/>
      <path d="M118,-13 A13,13 0 0,1 130,-13" stroke-width="3" opacity="0.8"/>
      <circle cx="124" cy="-5" r="4" fill="white" opacity="0.8"/>
    </g>
    <!-- Dots -->
    <g fill="white" opacity="0.28">
      <circle cx="-155" cy="55" r="4"/><circle cx="-143" cy="55" r="4"/><circle cx="-131" cy="55" r="4"/><circle cx="-119" cy="55" r="4"/>
      <circle cx="-84" cy="55" r="4"/><circle cx="-72" cy="55" r="4"/><circle cx="-60" cy="55" r="4"/><circle cx="-48" cy="55" r="4"/>
    </g>
    <!-- FC -->
    <circle cx="172" cy="105" r="20" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <text x="172" y="110" font-family="Arial" font-size="11" font-weight="700" fill="white" opacity="0.7" text-anchor="middle">FC</text>
  </g>

  <!-- "3 כרטיסים" badge -->
  <rect x="350" y="700" width="200" height="46" rx="23" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <text x="450" y="729" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" opacity="0.85" text-anchor="middle">חבילת 3 כרטיסים</text>

  <text x="450" y="800" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">FindCard PRO — שמור על כולם</text>
  <text x="450" y="824" font-family="Arial, sans-serif" font-size="13" fill="#8899BB" text-anchor="middle">למשפחה, לרכב, למזוודה</text>
</svg>
