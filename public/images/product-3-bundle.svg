    <text x="0" y="4" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="48" fill="#7DD3FC" letter-spacing="-1" text-anchor="middle">Find</text>
    <text x="0" y="58" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="48" fill="#F1F5F9" letter-spacing="-1" text-anchor="middle">Card</text>
    <line x1="-52" y1="71" x2="52" y2="71" stroke="white" stroke-width="0.5" opacity="0.10"/>
    <text x="0" y="92" font-family="Arial,Helvetica,sans-serif" font-size="10.5" fill="white" opacity="0.42" text-anchor="middle">Works with Apple Find My</text>
