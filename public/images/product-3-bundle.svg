<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="p3bg" cx="50%" cy="46%" r="72%">
      <stop offset="0%" stop-color="#1A1C24"/>
      <stop offset="60%" stop-color="#0F1018"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <radialGradient id="p3glow" cx="50%" cy="46%" r="48%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1E3A5F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="p3card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2C30"/>
      <stop offset="45%" stop-color="#1C1C20"/>
      <stop offset="100%" stop-color="#0E0E12"/>
    </linearGradient>
    <radialGradient id="p3gloss" cx="22%" cy="14%" r="68%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="p3shadowL" x="-30%" y="-30%" width="160%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset dx="-10" dy="28" in="blur" result="ob"/>
      <feComponentTransfer in="ob" result="s">
        <feFuncA type="linear" slope="0.60"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="p3shadowC" x="-30%" y="-30%" width="160%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24" result="blur"/>
      <feOffset dx="0" dy="32" in="blur" result="ob"/>
      <feComponentTransfer in="ob" result="s">
        <feFuncA type="linear" slope="0.65"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="p3shadowR" x="-30%" y="-30%" width="160%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feOffset dx="10" dy="28" in="blur" result="ob"/>
      <feComponentTransfer in="ob" result="s">
        <feFuncA type="linear" slope="0.60"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="p3chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E27A"/>
      <stop offset="50%" stop-color="#C4940F"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="800" fill="url(#p3bg)"/>
  <!-- Center glow -->
  <ellipse cx="400" cy="400" rx="300" ry="240" fill="url(#p3glow)"/>
  <!-- Subtle dot pattern -->
  <pattern id="p3dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="white" opacity="0.04"/>
  </pattern>
  <rect width="800" height="800" fill="url(#p3dots)"/>

  <!-- LEFT card (rotated more) -->
  <g filter="url(#p3shadowL)" transform="translate(270, 420) rotate(-20)">
    <rect x="-200" y="-126" width="400" height="252" rx="22" fill="url(#p3card)"/>
    <rect x="-200" y="-126" width="400" height="252" rx="22" fill="url(#p3gloss)"/>
    <rect x="-200" y="-126" width="400" height="5" rx="2.5" fill="white" opacity="0.18"/>
    <rect x="-200" y="-121" width="2" height="242" rx="1" fill="white" opacity="0.08"/>
    <rect x="-178" y="-78" width="40" height="32" rx="5" fill="url(#p3chip)" opacity="0.80"/>
    <circle cx="142" cy="90" r="11" fill="#1D4ED8" opacity="0.70"/>
    <text x="142" y="95" font-family="'Arial Black', Arial, sans-serif" font-size="8" font-weight="900" fill="white" text-anchor="middle" direction="ltr" opacity="0.90">FC</text>
  </g>

  <!-- RIGHT card (rotated the other way) -->
  <g filter="url(#p3shadowR)" transform="translate(530, 420) rotate(20)">
    <rect x="-200" y="-126" width="400" height="252" rx="22" fill="url(#p3card)"/>
    <rect x="-200" y="-126" width="400" height="252" rx="22" fill="url(#p3gloss)"/>
    <rect x="-200" y="-126" width="400" height="5" rx="2.5" fill="white" opacity="0.18"/>
    <rect x="198" y="-121" width="2" height="242" rx="1" fill="white" opacity="0.06"/>
    <rect x="-178" y="-78" width="40" height="32" rx="5" fill="url(#p3chip)" opacity="0.80"/>
    <circle cx="142" cy="90" r="11" fill="#1D4ED8" opacity="0.70"/>
    <text x="142" y="95" font-family="'Arial Black', Arial, sans-serif" font-size="8" font-weight="900" fill="white" text-anchor="middle" direction="ltr" opacity="0.90">FC</text>
  </g>

  <!-- CENTER card (front, straight) -->
  <g filter="url(#p3shadowC)" transform="translate(400, 400) rotate(0)">
    <rect x="-210" y="-132" width="420" height="264" rx="24" fill="url(#p3card)"/>
    <rect x="-210" y="-132" width="420" height="264" rx="24" fill="url(#p3gloss)"/>
    <rect x="-210" y="-132" width="420" height="5" rx="2.5" fill="white" opacity="0.22"/>
    <rect x="-210" y="-127" width="2.5" height="254" rx="1.2" fill="white" opacity="0.10"/>
    <!-- Chip -->
    <rect x="-186" y="-84" width="44" height="34" rx="6" fill="url(#p3chip)"/>
    <rect x="-186" y="-73" width="44" height="1.1" fill="#7A4F00" opacity="0.50"/>
    <rect x="-186" y="-63" width="44" height="1.1" fill="#7A4F00" opacity="0.50"/>
    <rect x="-173" y="-84" width="1.1" height="34" fill="#7A4F00" opacity="0.50"/>
    <rect x="-162" y="-84" width="1.1" height="34" fill="#7A4F00" opacity="0.50"/>
    <!-- Signal arcs -->
    <path d="M150 -100 Q158 -92 150 -84" stroke="white" stroke-width="2" fill="none" opacity="0.18"/>
    <path d="M158 -110 Q172 -92 158 -74" stroke="white" stroke-width="1.6" fill="none" opacity="0.12"/>
    <path d="M166 -120 Q186 -92 166 -64" stroke="white" stroke-width="1.2" fill="none" opacity="0.08"/>
    <!-- Divider -->
    <line x1="-200" y1="60" x2="200" y2="60" stroke="white" stroke-width="0.5" opacity="0.09"/>
    <!-- FC badge -->
    <circle cx="158" cy="96" r="15" fill="#1D4ED8" opacity="0.80"/>
    <text x="158" y="101" font-family="'Arial Black', Arial, sans-serif" font-size="10" font-weight="900" fill="white" text-anchor="middle" direction="ltr" opacity="0.96">FC</text>
    <text x="136" y="116" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" direction="ltr" opacity="0.25" letter-spacing="1">FindCard</text>
  </g>

  <!-- "3 כרטיסים" label -->
  <rect x="296" y="600" width="208" height="36" rx="18" fill="white" opacity="0.08"/>
  <text x="400" y="623" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle" opacity="0.70" direction="rtl">3 כרטיסי מעקב</text>

  <!-- Ground shadow -->
  <ellipse cx="400" cy="685" rx="185" ry="10" fill="black" opacity="0.45"/>
</svg>
