<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 504" width="800" height="504">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#1A1535"/>
    </linearGradient>
    <linearGradient id="card3" x1="8%" y1="5%" x2="92%" y2="95%">
      <stop offset="0%" stop-color="#1C2C48"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0C1320"/>
    </linearGradient>
    <radialGradient id="shine3" cx="78%" cy="12%" r="45%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topGlow3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="10%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh3" x="-28%" y="-35%" width="156%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="b"/>
      <feOffset in="b" dx="0" dy="20" result="o"/>
      <feColorMatrix type="matrix" in="o" values="0 0 0 0 0.03 0 0 0 0 0.06 0 0 0 0 0.2 0 0 0 0.55 0" result="c"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="504" fill="url(#bg3)"/>
  <ellipse cx="400" cy="270" rx="300" ry="200" fill="url(#glowBg)"/>

