    <text x="0" y="42" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="38" fill="#F1F5F9" letter-spacing="-0.5" text-anchor="middle" opacity="0.65">Card</text>
    <text x="0" y="68" font-family="Arial,sans-serif" font-size="8.5" fill="white" opacity="0.28" text-anchor="middle">Works with Apple Find My</text>
