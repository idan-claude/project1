<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="p1bg" cx="50%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F4F5F7"/>
      <stop offset="100%" stop-color="#E3E5EB"/>
    </radialGradient>
    <linearGradient id="p1card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2D"/>
      <stop offset="40%" stop-color="#1A1A1D"/>
      <stop offset="100%" stop-color="#0C0C0E"/>
    </linearGradient>
    <radialGradient id="p1gloss" cx="22%" cy="14%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="p1shadow" x="-30%" y="-30%" width="160%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22" result="blur"/>
      <feOffset dx="0" dy="28" in="blur" result="ob"/>
      <feComponentTransfer in="ob" result="s">
        <feFuncA type="linear" slope="0.50"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="p1glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" result="blur"/>
    </filter>
    <linearGradient id="p1chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E27A"/>
      <stop offset="35%" stop-color="#D4AC2A"/>
      <stop offset="70%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#p1bg)"/>
  <!-- Center warm glow -->
  <ellipse cx="400" cy="390" rx="260" ry="190" fill="white" opacity="0.38"/>

  <!-- Card with drop shadow -->
  <g filter="url(#p1shadow)" transform="translate(400, 425) rotate(-7)">
    <!-- Card body -->
    <rect x="-248" y="-157" width="496" height="314" rx="26" fill="url(#p1card)"/>
    <!-- Gloss -->
    <rect x="-248" y="-157" width="496" height="314" rx="26" fill="url(#p1gloss)"/>
    <!-- Top lacquer line -->
    <rect x="-248" y="-157" width="496" height="5" rx="2.5" fill="white" opacity="0.24"/>
    <!-- Left edge highlight -->
    <rect x="-248" y="-152" width="2.5" height="304" rx="1.2" fill="white" opacity="0.10"/>
    <!-- Bottom edge subtle -->
    <rect x="-240" y="152" width="480" height="2" rx="1" fill="white" opacity="0.05"/>

    <!-- Chip (SIM style) -->
    <rect x="-218" y="-108" width="52" height="40" rx="7" fill="url(#p1chip)"/>
    <rect x="-218" y="-95" width="52" height="1.2" fill="#7A4F00" opacity="0.50"/>
    <rect x="-218" y="-83" width="52" height="1.2" fill="#7A4F00" opacity="0.50"/>
    <rect x="-203" y="-108" width="1.2" height="40" fill="#7A4F00" opacity="0.50"/>
    <rect x="-190" y="-108" width="1.2" height="40" fill="#7A4F00" opacity="0.50"/>

    <!-- Subtle bluetooth / signal arcs (top right) -->
    <path d="M178 -120 Q188 -110 178 -100" stroke="white" stroke-width="2.2" fill="none" opacity="0.18"/>
    <path d="M188 -132 Q206 -110 188 -88" stroke="white" stroke-width="1.8" fill="none" opacity="0.12"/>
    <path d="M198 -144 Q224 -110 198 -76" stroke="white" stroke-width="1.4" fill="none" opacity="0.07"/>

    <!-- Horizontal divider line -->
    <line x1="-218" y1="72" x2="218" y2="72" stroke="white" stroke-width="0.6" opacity="0.10"/>

    <!-- Tiny FC logo bottom-right -->
    <circle cx="188" cy="110" r="16" fill="#1D4ED8" opacity="0.80"/>
    <text x="188" y="115"
          font-family="'Arial Black', Arial, sans-serif"
          font-size="10" font-weight="900"
          fill="white" text-anchor="middle"
          direction="ltr" opacity="0.96">FC</text>
    <!-- "FindCard" label tiny -->
    <text x="166" y="132"
          font-family="Arial, sans-serif"
          font-size="9" fill="white"
          text-anchor="middle"
          direction="ltr" opacity="0.28" letter-spacing="1">FindCard</text>
  </g>

  <!-- Ground reflection/shadow -->
  <ellipse cx="408" cy="675" rx="200" ry="14" fill="black" opacity="0.10"/>
  <ellipse cx="408" cy="672" rx="160" ry="8" fill="black" opacity="0.07"/>
</svg>
