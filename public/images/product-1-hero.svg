<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 504" width="800" height="504">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDF0F5"/>
    </radialGradient>
    <linearGradient id="card" x1="8%" y1="5%" x2="92%" y2="95%">
      <stop offset="0%" stop-color="#1C2C48"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0C1320"/>
    </linearGradient>
    <radialGradient id="shine" cx="78%" cy="12%" r="45%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="12%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="led" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-22%" y="-28%" width="144%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="b1"/>
      <feOffset in="b1" dx="7" dy="26" result="o1"/>
      <feColorMatrix type="matrix" in="o1" values="0 0 0 0 0.04 0 0 0 0 0.07 0 0 0 0 0.16 0 0 0 0.30 0" result="c1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b2"/>
      <feOffset in="b2" dx="3" dy="8" result="o2"/>
      <feColorMatrix type="matrix" in="o2" values="0 0 0 0 0.03 0 0 0 0 0.06 0 0 0 0 0.14 0 0 0 0.18 0" result="c2"/>
      <feMerge>
        <feMergeNode in="c1"/>
        <feMergeNode in="c2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="tex" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="5" y2="5" stroke="white" stroke-width="0.25" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="800" height="504" fill="url(#bg)"/>
  <ellipse cx="400" cy="395" rx="225" ry="16" fill="#A0AABF" opacity="0.15"/>

  <g transform="translate(400,240) rotate(-8)" filter="url(#sh)">
    <rect x="-222" y="-140" width="444" height="280" rx="20" fill="url(#card)"/>
    <rect x="-222" y="-140" width="444" height="280" rx="20" fill="url(#tex)"/>
    <rect x="-222" y="-140" width="444" height="280" rx="20" fill="url(#topGlow)"/>
    <rect x="-222" y="-140" width="444" height="280" rx="20" fill="url(#shine)"/>
    <rect x="-222" y="136" width="444" height="6" rx="3" fill="white" opacity="0.025"/>

    <!-- LED top-right -->
    <circle cx="188" cy="-110" r="9" fill="url(#led)"/>
    <circle cx="188" cy="-110" r="3.5" fill="#38BDF8"/>

    <!-- NFC arcs near LED -->
    <g transform="translate(144,-110)" opacity="0.22">
      <path d="M0,12 Q8,-2 16,12" fill="none" stroke="#7DD3FC" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M-4,17 Q8,-7 20,17" fill="none" stroke="#7DD3FC" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <!-- Top-left small label -->
    <text x="-205" y="-112" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="500" fill="white" opacity="0.32" letter-spacing="2.5">FINDCARD PRO</text>

    <!-- Main logo centered -->
    <text x="0" y="6" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="50" fill="#7DD3FC" letter-spacing="-1" text-anchor="middle">Find</text>
    <text x="0" y="62" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="50" fill="#F1F5F9" letter-spacing="-1" text-anchor="middle">Card</text>

    <!-- Thin separator -->
    <line x1="-55" y1="76" x2="55" y2="76" stroke="white" stroke-width="0.5" opacity="0.10"/>

    <!-- Apple Find My -->
    <text x="0" y="97" font-family="Arial,Helvetica,sans-serif" font-size="10.5" fill="white" opacity="0.42" text-anchor="middle" letter-spacing="0.3">Works with Apple Find My</text>

    <!-- Bottom spec strip -->
    <text x="-205" y="120" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="white" opacity="0.22">IP67  ·  Bluetooth 5.1  ·  Qi Charging  ·  1.8mm</text>

    <!-- MFi badge -->
    <rect x="168" y="108" width="50" height="20" rx="4" fill="white" opacity="0.06"/>
    <text x="193" y="122" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="600" fill="white" opacity="0.38" text-anchor="middle">MFi ✓</text>
  </g>

  <!-- Floor reflection -->
  <g transform="translate(400,381) scale(1,-0.07)" opacity="0.06">
    <rect x="-222" y="-140" width="444" height="280" rx="20" fill="url(#card)"/>
  </g>
</svg>
