<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FB"/>
      <stop offset="100%" stop-color="#ECEEF2"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2C30"/>
      <stop offset="50%" stop-color="#18181C"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
    <linearGradient id="cardEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="40%" stop-color="#C8960A"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
    <linearGradient id="chipShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="900" fill="url(#bg1)"/>
  <!-- Subtle center vignette highlight -->
  <ellipse cx="450" cy="440" rx="320" ry="220" fill="white" opacity="0.45"/>

  <!-- Shadow layers (vector, no filter) -->
  <rect x="173" y="342" width="554" height="351" rx="30" fill="#000000" opacity="0.06" transform="translate(0,18)"/>
  <rect x="173" y="342" width="554" height="351" rx="30" fill="#000000" opacity="0.05" transform="translate(0,10)"/>
  <rect x="173" y="342" width="554" height="351" rx="30" fill="#000000" opacity="0.04" transform="translate(0,5)"/>

  <!-- Card group (rotated -7°) -->
  <g transform="translate(450 460) rotate(-7)">
    <!-- Card body -->
    <rect x="-277" y="-175" width="554" height="351" rx="28" fill="url(#card1)"/>
    <!-- Top edge shine -->
    <rect x="-277" y="-175" width="554" height="351" rx="28" fill="url(#cardEdge)"/>
    <!-- Top rim highlight line -->
    <rect x="-277" y="-175" width="554" height="6" rx="3" fill="white" opacity="0.20"/>
    <!-- Left rim highlight -->
    <rect x="-277" y="-175" width="5" height="351" rx="2.5" fill="white" opacity="0.10"/>

    <!-- Chip body -->
    <rect x="-190" y="-90" width="62" height="50" rx="8" fill="url(#chip)"/>
    <rect x="-190" y="-90" width="62" height="50" rx="8" fill="url(#chipShine)"/>
    <!-- Chip lines -->
    <line x1="-190" y1="-76" x2="-128" y2="-76" stroke="#7A5200" stroke-width="1" opacity="0.4"/>
    <line x1="-190" y1="-64" x2="-128" y2="-64" stroke="#7A5200" stroke-width="1" opacity="0.4"/>
    <line x1="-190" y1="-52" x2="-128" y2="-52" stroke="#7A5200" stroke-width="1" opacity="0.4"/>
    <line x1="-163" y1="-90" x2="-163" y2="-40" stroke="#7A5200" stroke-width="1" opacity="0.4"/>
    <line x1="-149" y1="-90" x2="-149" y2="-40" stroke="#7A5200" stroke-width="1" opacity="0.4"/>

    <!-- WiFi / NFC arcs -->
    <g transform="translate(170, -55)" fill="none" stroke="white" stroke-linecap="round">
      <path d="M-30,-30 A43,43 0 0,1 30,-30" stroke-width="4.5" opacity="0.55"/>
      <path d="M-20,-18 A29,29 0 0,1 20,-18" stroke-width="4" opacity="0.70"/>
      <path d="M-10,-6 A15,15 0 0,1 10,-6" stroke-width="3.5" opacity="0.85"/>
      <circle cx="0" cy="3" r="4" fill="white" opacity="0.85"/>
    </g>

    <!-- Card number dots -->
    <g fill="white" opacity="0.35">
      <circle cx="-190" cy="60" r="4"/><circle cx="-178" cy="60" r="4"/><circle cx="-166" cy="60" r="4"/><circle cx="-154" cy="60" r="4"/>
      <circle cx="-110" cy="60" r="4"/><circle cx="-98" cy="60" r="4"/><circle cx="-86" cy="60" r="4"/><circle cx="-74" cy="60" r="4"/>
      <circle cx="-30" cy="60" r="4"/><circle cx="-18" cy="60" r="4"/><circle cx="-6" cy="60" r="4"/><circle cx="6" cy="60" r="4"/>
      <circle cx="50" cy="60" r="4"/><circle cx="62" cy="60" r="4"/><circle cx="74" cy="60" r="4"/><circle cx="86" cy="60" r="4"/>
    </g>

    <!-- FC badge bottom-right -->
    <circle cx="220" cy="120" r="22" fill="white" opacity="0.12"/>
    <circle cx="220" cy="120" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.30"/>
    <text x="220" y="125" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" opacity="0.75" text-anchor="middle" letter-spacing="0.5">FC</text>
  </g>

  <!-- "FindCard PRO" label bottom -->
  <text x="450" y="778" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E" text-anchor="middle" opacity="0.85">FindCard PRO</text>
  <text x="450" y="804" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">כרטיס מעקב חכם · Apple Find My</text>
</svg>
