      <line x1="14" y1="0" x2="14" y2="35" stroke="#92400E" stroke-width="0.8" opacity="0.40"/>
      <line x1="30" y1="0" x2="30" y2="35" stroke="#92400E" stroke-width="0.8" opacity="0.40"/>
      <line x1="0" y1="11" x2="44" y2="11" stroke="#92400E" stroke-width="0.8" opacity="0.40"/>
      <line x1="0" y1="24" x2="44" y2="24" stroke="#92400E" stroke-width="0.8" opacity="0.40"/>
      <ellipse cx="22" cy="17" rx="9" ry="7" fill="none" stroke="#92400E" stroke-width="0.6" opacity="0.35"/>
    </g>
    <!-- Contactless -->
