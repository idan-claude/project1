  <line x1="594" y1="246" x2="644" y2="246" stroke="#2563EB" stroke-width="1.3" stroke-dasharray="4,3"/>
  <circle cx="594" cy="246" r="3.8" fill="#2563EB"/>
  <line x1="644" y1="232" x2="644" y2="260" stroke="#2563EB" stroke-width="2"/>
  <line x1="644" y1="232" x2="638" y2="232" stroke="#2563EB" stroke-width="2"/>
  <line x1="644" y1="260" x2="638" y2="260" stroke="#2563EB" stroke-width="2"/>
  <rect x="648" y="226" width="140" height="38" rx="11" fill="#2563EB"/>
  <text x="718" y="242" font-family="'Arial',Helvetica,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">עובי 1.8מ״מ</text>
  <text x="718" y="257" font-family="'Arial',Helvetica,sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">נכנס לכל ארנק</text>

  <!-- Battery — BOTTOM RIGHT -->
  <line x1="506" y1="368" x2="556" y2="408" stroke="#1D4ED8" stroke-width="1.3" stroke-dasharray="4,3"/>
  <circle cx="506" cy="368" r="3.8" fill="#1D4ED8"/>
  <rect x="484" y="410" width="168" height="38" rx="11" fill="#1D4ED8"/>
