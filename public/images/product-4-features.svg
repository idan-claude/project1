<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 504" width="800" height="504">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#F0F7FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </radialGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="40%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <radialGradient id="shine4" cx="30%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <filter id="sh4" x="-18%" y="-18%" width="136%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16" result="b"/>
      <feOffset in="b" dx="0" dy="18" result="o"/>
      <feColorMatrix in="o" type="matrix" values="0 0 0 0 0.06 0 0 0 0 0.12 0 0 0 0 0.40 0 0 0 0.30 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots4" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="0.7" fill="white" opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="800" height="504" fill="url(#bg4)"/>

  <!-- Card: flat, centered -->
  <g transform="translate(400,252)" filter="url(#sh4)">
    <rect x="-196" y="-124" width="392" height="248" rx="20" fill="url(#card4)"/>
    <rect x="-196" y="-124" width="392" height="248" rx="20" fill="url(#dots4)"/>
    <rect x="-196" y="-124" width="392" height="248" rx="20" fill="url(#shine4)"/>
    <rect x="-196" y="-124" width="392" height="5" rx="2" fill="white" opacity="0.15"/>

    <!-- Chip -->
    <g transform="translate(-152,-80)">
      <rect x="0" y="0" width="44" height="35" rx="5" fill="url(#chip4)"/>
      <line x1="0" y1="11" x2="44" y2="11" stroke="#92400E" stroke-width="0.6" opacity="0.35"/>
      <line x1="0" y1="23" x2="44" y2="23" stroke="#92400E" stroke-width="0.6" opacity="0.35"/>
      <line x1="14" y1="0" x2="14" y2="35" stroke="#92400E" stroke-width="0.6" opacity="0.35"/>
      <line x1="30" y1="0" x2="30" y2="35" stroke="#92400E" stroke-width="0.6" opacity="0.35"/>
    </g>

    <!-- WiFi arcs -->
    <g transform="translate(-84,-66)" opacity="0.88">
      <circle cx="0" cy="12" r="3" fill="white"/>
      <path d="M-10,5 Q0,-7 10,5" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M-18,-1 Q0,-17 18,-1" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.68"/>
      <path d="M-26,-7 Q0,-27 26,-7" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.42"/>
    </g>

    <!-- Branding -->
    <text x="-180" y="-100" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="700" fill="white" opacity="0.72" letter-spacing="3.5">FINDCARD</text>
    <rect x="-96" y="-112" width="34" height="15" rx="7.5" fill="white" opacity="0.28"/>
    <text x="-79" y="-101" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="800" fill="white" text-anchor="middle" opacity="0.95">PRO</text>

    <!-- Main text -->
    <text x="-42" y="18" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="58" fill="white" letter-spacing="-1" text-anchor="middle">Find</text>
    <text x="104" y="18" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="58" fill="white" letter-spacing="-1" text-anchor="middle">Card</text>

    <!-- Dots row -->
    <circle cx="-155" cy="48" r="2.5" fill="white" opacity="0.28"/>
    <circle cx="-144" cy="48" r="2.5" fill="white" opacity="0.28"/>
    <circle cx="-133" cy="48" r="2.5" fill="white" opacity="0.28"/>
    <circle cx="-122" cy="48" r="2.5" fill="white" opacity="0.28"/>
    <circle cx="-105" cy="48" r="2.5" fill="white" opacity="0.28"/>
    <circle cx="-94" cy="48" r="2.5" fill="white" opacity="0.28"/>
    <circle cx="-83" cy="48" r="2.5" fill="white" opacity="0.28"/>
    <circle cx="-72" cy="48" r="2.5" fill="white" opacity="0.28"/>

    <line x1="-180" y1="68" x2="180" y2="68" stroke="white" stroke-width="0.5" opacity="0.14"/>
    <text x="-180" y="88" font-family="Arial,Helvetica,sans-serif" font-size="8.5" font-weight="700" fill="white" opacity="0.65">FINDCARD PRO</text>
    <text x="-180" y="102" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="white" opacity="0.40">Apple Find My · Bluetooth 5.1 · 1.8mm · IP67 · 8-Month Battery</text>
    <rect x="148" y="96" width="46" height="18" rx="5" fill="white" opacity="0.20"/>
    <text x="171" y="109" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.85" text-anchor="middle">MFi ✓</text>
  </g>

  <!-- Callout: Apple Find My (top) -->
  <line x1="400" y1="128" x2="400" y2="60" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="400" cy="128" r="4" fill="#2563EB"/>
  <rect x="310" y="24" width="180" height="34" rx="9" fill="#2563EB"/>
  <text x="400" y="40" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">📡 Apple Find My</text>
  <text x="400" y="53" font-family="Arial,Helvetica,sans-serif" font-size="9.5" fill="#BFDBFE" text-anchor="middle">500M+ מכשירי iPhone ברשת</text>

  <!-- Callout: Bluetooth (top-right) -->
  <line x1="576" y1="154" x2="640" y2="130" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="576" cy="154" r="4" fill="#1D4ED8"/>
  <rect x="638" y="108" width="142" height="34" rx="9" fill="#1D4ED8"/>
  <text x="709" y="124" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">🔵 Bluetooth 5.1</text>
  <text x="709" y="137" font-family="Arial,Helvetica,sans-serif" font-size="9.5" fill="#BFDBFE" text-anchor="middle">טווח עד 90 מטר</text>

  <!-- Callout: Thickness (right) -->
  <line x1="608" y1="252" x2="660" y2="252" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="608" cy="252" r="4" fill="#2563EB"/>
  <line x1="660" y1="238" x2="660" y2="266" stroke="#2563EB" stroke-width="2"/>
  <line x1="660" y1="238" x2="654" y2="238" stroke="#2563EB" stroke-width="2"/>
  <line x1="660" y1="266" x2="654" y2="266" stroke="#2563EB" stroke-width="2"/>
  <rect x="664" y="234" width="122" height="34" rx="9" fill="#2563EB"/>
  <text x="725" y="250" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">עובי 1.8מ"מ בלבד</text>
  <text x="725" y="263" font-family="Arial,Helvetica,sans-serif" font-size="9.5" fill="#BFDBFE" text-anchor="middle">דק כמו כרטיס אשראי</text>

  <!-- Callout: Battery (bottom-right) -->
  <line x1="522" y1="376" x2="572" y2="418" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="522" cy="376" r="4" fill="#1D4ED8"/>
  <rect x="496" y="420" width="160" height="34" rx="9" fill="#1D4ED8"/>
  <text x="576" y="436" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">🔋 8 חודשי סוללה</text>
  <text x="576" y="449" font-family="Arial,Helvetica,sans-serif" font-size="9.5" fill="#BFDBFE" text-anchor="middle">טעינה אלחוטית Qi</text>

  <!-- Callout: IP67 (bottom-left) -->
  <line x1="278" y1="376" x2="228" y2="418" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="278" cy="376" r="4" fill="#2563EB"/>
  <rect x="94" y="420" width="136" height="34" rx="9" fill="#2563EB"/>
  <text x="162" y="436" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">🌊 עמידות IP67</text>
  <text x="162" y="449" font-family="Arial,Helvetica,sans-serif" font-size="9.5" fill="#BFDBFE" text-anchor="middle">עד 1 מטר / 30 דקות</text>

  <!-- Callout: NFC (left) -->
  <line x1="202" y1="208" x2="144" y2="188" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="202" cy="208" r="4" fill="#2563EB"/>
  <rect x="12" y="168" width="132" height="34" rx="9" fill="#2563EB"/>
  <text x="78" y="184" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">טעינה אלחוטית</text>
  <text x="78" y="197" font-family="Arial,Helvetica,sans-serif" font-size="9.5" fill="#BFDBFE" text-anchor="middle">Qi + NFC</text>
</svg>
