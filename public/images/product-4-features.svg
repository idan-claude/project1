  <text x="568" y="441" font-family="'Arial',Helvetica,sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">פעם בשמונה חודשים</text>

  <!-- IP67 — BOTTOM LEFT -->
  <line x1="294" y1="368" x2="244" y2="408" stroke="#2563EB" stroke-width="1.3" stroke-dasharray="4,3"/>
  <circle cx="294" cy="368" r="3.8" fill="#2563EB"/>
  <rect x="76" y="410" width="150" height="38" rx="11" fill="#2563EB"/>
  <text x="151" y="426" font-family="'Arial',Helvetica,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">🌊 עמיד במים IP67</text>
  <text x="151" y="441" font-family="'Arial',Helvetica,sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">עד מטר עומק</text>

  <!-- Qi — LEFT -->
  <line x1="208" y1="204" x2="152" y2="188" stroke="#2563EB" stroke-width="1.3" stroke-dasharray="4,3"/>
  <circle cx="208" cy="204" r="3.8" fill="#2563EB"/>
  <rect x="4" y="166" width="148" height="38" rx="11" fill="#2563EB"/>
  <text x="78" y="182" font-family="'Arial',Helvetica,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">טעינה Qi אלחוטית</text>
  <text x="78" y="197" font-family="'Arial',Helvetica,sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle">על כל משטח Qi</text>
