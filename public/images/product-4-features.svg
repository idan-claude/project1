<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E1525"/>
      <stop offset="100%" stop-color="#060B16"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E2E34"/>
      <stop offset="60%" stop-color="#18181C"/>
      <stop offset="100%" stop-color="#0C0C0E"/>
    </linearGradient>
    <linearGradient id="chip4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="50%" stop-color="#C8960A"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
    <linearGradient id="shine4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cardGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2244AA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2244AA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="900" fill="url(#bg4)"/>
  <ellipse cx="450" cy="450" rx="280" ry="280" fill="url(#cardGlow)"/>

  <!-- Card (center, slight rotation) -->
  <g transform="translate(450 460) rotate(-4)">
    <rect x="-205" y="-130" width="410" height="260" rx="24" fill="#000" opacity="0.5" transform="translate(6,12)"/>
    <rect x="-205" y="-130" width="410" height="260" rx="24" fill="url(#card4)"/>
    <rect x="-205" y="-130" width="410" height="260" rx="24" fill="url(#shine4)"/>
    <rect x="-205" y="-130" width="410" height="5" rx="2.5" fill="white" opacity="0.17"/>
    <rect x="-205" y="-130" width="5" height="260" rx="2.5" fill="white" opacity="0.09"/>

    <!-- Chip -->
    <rect x="-145" y="-68" width="52" height="42" rx="7" fill="url(#chip4)"/>
    <line x1="-145" y1="-56" x2="-93" y2="-56" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-145" y1="-44" x2="-93" y2="-44" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-126" y1="-68" x2="-126" y2="-26" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>
    <line x1="-112" y1="-68" x2="-112" y2="-26" stroke="#7A5200" stroke-width="0.8" opacity="0.5"/>

    <!-- NFC -->
    <g fill="none" stroke="white" stroke-linecap="round">
      <path d="M92,-38 A38,38 0 0,1 136,-38" stroke-width="4" opacity="0.45"/>
      <path d="M100,-24 A24,24 0 0,1 128,-24" stroke-width="3.5" opacity="0.60"/>
      <path d="M108,-11 A12,12 0 0,1 120,-11" stroke-width="3" opacity="0.75"/>
      <circle cx="114" cy="-3" r="4" fill="white" opacity="0.75"/>
    </g>

    <!-- Number dots -->
    <g fill="white" opacity="0.25">
      <circle cx="-145" cy="52" r="3.5"/><circle cx="-135" cy="52" r="3.5"/><circle cx="-125" cy="52" r="3.5"/><circle cx="-115" cy="52" r="3.5"/>
      <circle cx="-82" cy="52" r="3.5"/><circle cx="-72" cy="52" r="3.5"/><circle cx="-62" cy="52" r="3.5"/><circle cx="-52" cy="52" r="3.5"/>
      <circle cx="-19" cy="52" r="3.5"/><circle cx="-9" cy="52" r="3.5"/><circle cx="1" cy="52" r="3.5"/><circle cx="11" cy="52" r="3.5"/>
      <circle cx="44" cy="52" r="3.5"/><circle cx="54" cy="52" r="3.5"/><circle cx="64" cy="52" r="3.5"/><circle cx="74" cy="52" r="3.5"/>
    </g>

    <!-- FC logo -->
    <circle cx="160" cy="98" r="20" fill="none" stroke="white" stroke-width="1.5" opacity="0.28"/>
    <text x="160" y="103" font-family="Arial" font-size="11" font-weight="700" fill="white" opacity="0.65" text-anchor="middle">FC</text>
  </g>

  <!-- Feature callout boxes -->
  <!-- Top-left: Apple Find My -->
  <g transform="translate(115 245)">
    <rect x="0" y="0" width="178" height="68" rx="14" fill="#1C2E50" stroke="#2A4880" stroke-width="1.5"/>
    <text x="14" y="26" font-family="Arial" font-size="13" font-weight="700" fill="white">📡 Apple Find My</text>
    <text x="14" y="45" font-family="Arial" font-size="11" fill="#7B9CCF">500M+ מכשירים ברשת</text>
    <!-- Connector line to card -->
    <line x1="178" y1="34" x2="230" y2="340" stroke="#2A4880" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  </g>

  <!-- Top-right: Battery -->
  <g transform="translate(607 245)">
    <rect x="0" y="0" width="178" height="68" rx="14" fill="#1C3828" stroke="#2A5838" stroke-width="1.5"/>
    <text x="14" y="26" font-family="Arial" font-size="13" font-weight="700" fill="white">🔋 8 חודשי סוללה</text>
    <text x="14" y="45" font-family="Arial" font-size="11" fill="#7BC49A">טעינה אלחוטית Qi</text>
    <line x1="0" y1="34" x2="-38" y2="335" stroke="#2A5838" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  </g>

  <!-- Bottom-left: Thickness -->
  <g transform="translate(115 580)">
    <rect x="0" y="0" width="178" height="68" rx="14" fill="#2E1C50" stroke="#4A2A80" stroke-width="1.5"/>
    <text x="14" y="26" font-family="Arial" font-size="13" font-weight="700" fill="white">💳 עובי 1.8 מ״מ</text>
    <text x="14" y="45" font-family="Arial" font-size="11" fill="#B07CF0">נכנס לכל ארנק</text>
    <line x1="178" y1="34" x2="228" y2="530" stroke="#4A2A80" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  </g>

  <!-- Bottom-right: Waterproof -->
  <g transform="translate(607 580)">
    <rect x="0" y="0" width="178" height="68" rx="14" fill="#1C2E40" stroke="#1A4A60" stroke-width="1.5"/>
    <text x="14" y="26" font-family="Arial" font-size="13" font-weight="700" fill="white">🌊 IP67 עמיד מים</text>
    <text x="14" y="45" font-family="Arial" font-size="11" fill="#5AAED0">גשם · שלג · לחות</text>
    <line x1="0" y1="34" x2="-36" y2="530" stroke="#1A4A60" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  </g>

  <text x="450" y="800" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">FindCard PRO — פיצ׳רים מלאים</text>
  <text x="450" y="824" font-family="Arial, sans-serif" font-size="13" fill="#5577AA" text-anchor="middle">הטכנולוגיה הטובה ביותר בפורמט הכי דק</text>
</svg>
