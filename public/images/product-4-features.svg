<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e3a8a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg4)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="52" fill="url(#accent4)"/>
  <text x="400" y="34" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="22" font-weight="900" fill="white" direction="rtl">המפרט המלא של FindCard PRO</text>

  <!-- Row 1: 3 feature cards -->

  <!-- Card 1: Apple Find My -->
  <rect x="18" y="68" width="238" height="182" rx="16" fill="white" filter="url(#card-shadow)"/>
  <rect x="18" y="68" width="238" height="6" rx="3" fill="#3b82f6"/>
  <text x="137" y="126" text-anchor="middle" font-size="44">📡</text>
  <text x="137" y="165" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" fill="#1e3a8a" direction="ltr">Apple Find My</text>
  <text x="137" y="191" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#374151" direction="rtl">500 מיליון מכשיר</text>
  <text x="137" y="211" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#6B7280" direction="rtl">ברשת Apple — בכל מקום בעולם</text>

  <!-- Card 2: Thickness -->
  <rect x="281" y="68" width="238" height="182" rx="16" fill="white" filter="url(#card-shadow)"/>
  <rect x="281" y="68" width="238" height="6" rx="3" fill="#8b5cf6"/>
  <text x="400" y="126" text-anchor="middle" font-size="44">💳</text>
  <text x="400" y="165" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" fill="#1e3a8a" direction="rtl">עובי 1.8 מ"מ</text>
  <text x="400" y="191" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#374151" direction="rtl">דק כמו כרטיס אשראי</text>
  <text x="400" y="211" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#6B7280" direction="rtl">נכנס לכל ארנק בלי לחוש אותו</text>

  <!-- Card 3: Bluetooth -->
  <rect x="544" y="68" width="238" height="182" rx="16" fill="white" filter="url(#card-shadow)"/>
  <rect x="544" y="68" width="238" height="6" rx="3" fill="#06b6d4"/>
  <text x="663" y="126" text-anchor="middle" font-size="44">📶</text>
  <text x="663" y="165" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" fill="#1e3a8a" direction="ltr">Bluetooth 5.1</text>
  <text x="663" y="191" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#374151" direction="rtl">טווח עד 90 מטר</text>
  <text x="663" y="211" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#6B7280" direction="rtl">ובעולם דרך רשת Find My</text>

  <!-- Row 2: 3 feature cards -->

  <!-- Card 4: Battery -->
  <rect x="18" y="267" width="238" height="182" rx="16" fill="white" filter="url(#card-shadow)"/>
  <rect x="18" y="267" width="238" height="6" rx="3" fill="#10b981"/>
  <text x="137" y="325" text-anchor="middle" font-size="44">🔋</text>
  <text x="137" y="364" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" fill="#1e3a8a" direction="rtl">8 חודשי סוללה</text>
  <text x="137" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#374151" direction="rtl">טעינה אלחוטית Qi</text>
  <text x="137" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#6B7280" direction="rtl">פעם בשמונה חודשים</text>

  <!-- Card 5: IP67 -->
  <rect x="281" y="267" width="238" height="182" rx="16" fill="white" filter="url(#card-shadow)"/>
  <rect x="281" y="267" width="238" height="6" rx="3" fill="#3b82f6"/>
  <text x="400" y="325" text-anchor="middle" font-size="44">🌊</text>
  <text x="400" y="364" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" fill="#1e3a8a" direction="rtl">עמיד מים — IP67</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#374151" direction="rtl">עד מטר עומק, 30 דקות</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#6B7280" direction="rtl">גשם, שלג, לחות — לא בעיה</text>

  <!-- Card 6: Setup (accent) -->
  <rect x="544" y="267" width="238" height="182" rx="16" fill="url(#accent4)" filter="url(#card-shadow)"/>
  <text x="663" y="325" text-anchor="middle" font-size="44">⚡</text>
  <text x="663" y="364" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="19" font-weight="900" fill="white" direction="rtl">הגדרה ב-30 שניות</text>
  <text x="663" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#BFDBFE" direction="rtl">ללא הורדות ✓</text>
  <text x="663" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#93C5FD" direction="rtl">ללא הרשמה ✓</text>
</svg>
