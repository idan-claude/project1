  <!-- Apple Find My — TOP -->
  <line x1="400" y1="124" x2="400" y2="62" stroke="#2563EB" stroke-width="1.3" stroke-dasharray="4,3"/>
  <circle cx="400" cy="124" r="3.8" fill="#2563EB"/>
  <rect x="306" y="22" width="188" height="38" rx="11" fill="#2563EB"/>
  <text x="400" y="38" font-family="'Arial',Helvetica,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle" direction="ltr">📡 Apple Find My</text>
  <text x="400" y="53" font-family="'Arial',Helvetica,sans-serif" font-size="10" fill="#BFDBFE" text-anchor="middle" direction="rtl">מעל 500 מיליון מכשיר Apple</text>

  <!-- Bluetooth — TOP RIGHT -->
  <line x1="570" y1="158" x2="636" y2="132" stroke="#1D4ED8" stroke-width="1.3" stroke-dasharray="4,3"/>
