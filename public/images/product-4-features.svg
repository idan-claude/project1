<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </radialGradient>
    <linearGradient id="cg4" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="30%" stop-color="#3B82F6"/>
      <stop offset="65%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="shine4" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chip4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="30%" stop-color="#FCD34D"/>
      <stop offset="65%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <filter id="sh4" x="-20%" y="-22%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="b1"/>
      <feOffset in="b1" dx="0" dy="22" result="o1"/>
      <feColorMatrix in="o1" type="matrix" values="0 0 0 0 0.06 0 0 0 0 0.12 0 0 0 0 0.40 0 0 0 0.26 0" result="c1"/>
      <feMerge><feMergeNode in="c1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dp4" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="0.8" fill="white" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bg4)"/>

  <!-- ── CARD — flat, centered, very slight tilt ── -->
  <g transform="translate(400,248) rotate(-2)" filter="url(#sh4)">
    <rect x="-192" y="-122" width="384" height="244" rx="18" fill="url(#cg4)"/>
    <rect x="-192" y="-122" width="384" height="244" rx="18" fill="url(#dp4)"/>
    <rect x="-192" y="-122" width="384" height="244" rx="18" fill="url(#shine4)"/>
    <rect x="-192" y="-122" width="384" height="5" rx="2" fill="white" opacity="0.18"/>

    <!-- Chip -->
    <g transform="translate(-138,-74)">
