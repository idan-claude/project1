  <line x1="207" y1="204" x2="152" y2="186" stroke="#2563EB" stroke-width="1.4" stroke-dasharray="4,3"/>
  <circle cx="207" cy="204" r="4" fill="#2563EB"/>
  <rect x="12" y="166" width="140" height="34" rx="10" fill="#2563EB"/>
  <text x="82" y="182" font-family="'Arial',Helvetica,sans-serif" font-size="10.5" font-weight="700" fill="white" text-anchor="middle">טעינה אלחוטית</text>
  <text x="82" y="195" font-family="'Arial',Helvetica,sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">Qi + NFC</text>
