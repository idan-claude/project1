<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="p4bg" cx="50%" cy="46%" r="72%">
      <stop offset="0%" stop-color="#0D1526"/>
      <stop offset="60%" stop-color="#080F1C"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <radialGradient id="p4glow" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#1E3A6E" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#1E3A6E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="p4card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A2E"/>
      <stop offset="45%" stop-color="#1A1A1E"/>
      <stop offset="100%" stop-color="#0C0C10"/>
    </linearGradient>
    <radialGradient id="p4gloss" cx="22%" cy="14%" r="68%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="p4shadow" x="-30%" y="-30%" width="160%" height="190%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22" result="blur"/>
      <feOffset dx="0" dy="30" in="blur" result="ob"/>
      <feComponentTransfer in="ob" result="s">
        <feFuncA type="linear" slope="0.70"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="p4chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E27A"/>
      <stop offset="50%" stop-color="#C4940F"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
    <filter id="p4lineglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#p4bg)"/>
  <ellipse cx="400" cy="420" rx="280" ry="220" fill="url(#p4glow)"/>

  <!-- Card centered with shadow -->
  <g filter="url(#p4shadow)" transform="translate(400, 420)">
    <rect x="-220" y="-138" width="440" height="276" rx="24" fill="url(#p4card)"/>
    <rect x="-220" y="-138" width="440" height="276" rx="24" fill="url(#p4gloss)"/>
    <rect x="-220" y="-138" width="440" height="5" rx="2.5" fill="white" opacity="0.22"/>
    <rect x="-220" y="-133" width="2.5" height="266" rx="1.2" fill="white" opacity="0.10"/>
    <!-- Chip -->
    <rect x="-196" y="-88" width="46" height="36" rx="6" fill="url(#p4chip)"/>
    <rect x="-196" y="-76" width="46" height="1.1" fill="#7A4F00" opacity="0.50"/>
    <rect x="-196" y="-65" width="46" height="1.1" fill="#7A4F00" opacity="0.50"/>
    <rect x="-182" y="-88" width="1.1" height="36" fill="#7A4F00" opacity="0.50"/>
    <rect x="-170" y="-88" width="1.1" height="36" fill="#7A4F00" opacity="0.50"/>
    <!-- Signal arcs -->
    <path d="M155 -94 Q164 -84 155 -74" stroke="white" stroke-width="2.2" fill="none" opacity="0.20"/>
    <path d="M164 -106 Q180 -84 164 -62" stroke="white" stroke-width="1.7" fill="none" opacity="0.13"/>
    <path d="M173 -118 Q196 -84 173 -50" stroke="white" stroke-width="1.3" fill="none" opacity="0.08"/>
    <!-- Divider -->
    <line x1="-208" y1="68" x2="208" y2="68" stroke="white" stroke-width="0.6" opacity="0.10"/>
    <!-- FC badge -->
    <circle cx="162" cy="100" r="16" fill="#1D4ED8" opacity="0.80"/>
    <text x="162" y="106" font-family="'Arial Black', Arial, sans-serif" font-size="10" font-weight="900" fill="white" text-anchor="middle" direction="ltr" opacity="0.96">FC</text>
    <text x="140" y="122" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" direction="ltr" opacity="0.24" letter-spacing="1">FindCard</text>
  </g>

  <!-- ── Callout: TOP-LEFT — Apple Find My ── -->
  <line x1="248" y1="316" x2="160" y2="232" stroke="#3B82F6" stroke-width="1.2" opacity="0.55"/>
  <circle cx="248" cy="316" r="3" fill="#3B82F6" opacity="0.70"/>
  <rect x="50" y="186" width="196" height="54" rx="12" fill="white" opacity="0.08"/>
  <rect x="50" y="186" width="196" height="54" rx="12" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.30"/>
  <text x="148" y="207" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" opacity="0.90" direction="ltr">Apple Find My</text>
  <text x="148" y="228" font-family="Arial, sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle" opacity="0.80" direction="rtl">500 מיליון מכשיר</text>

  <!-- ── Callout: TOP-RIGHT — סוללה ── -->
  <line x1="552" y1="316" x2="640" y2="232" stroke="#3B82F6" stroke-width="1.2" opacity="0.55"/>
  <circle cx="552" cy="316" r="3" fill="#3B82F6" opacity="0.70"/>
  <rect x="554" y="186" width="196" height="54" rx="12" fill="white" opacity="0.08"/>
  <rect x="554" y="186" width="196" height="54" rx="12" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.30"/>
  <text x="652" y="207" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" opacity="0.90" direction="rtl">🔋 8 חודשי סוללה</text>
  <text x="652" y="228" font-family="Arial, sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle" opacity="0.80" direction="rtl">טעינה אלחוטית Qi</text>

  <!-- ── Callout: BOTTOM-LEFT — עובי ── -->
  <line x1="248" y1="524" x2="160" y2="594" stroke="#3B82F6" stroke-width="1.2" opacity="0.55"/>
  <circle cx="248" cy="524" r="3" fill="#3B82F6" opacity="0.70"/>
  <rect x="50" y="566" width="196" height="54" rx="12" fill="white" opacity="0.08"/>
  <rect x="50" y="566" width="196" height="54" rx="12" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.30"/>
  <text x="148" y="587" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" opacity="0.90" direction="rtl">💳 עובי 1.8 מ״מ</text>
  <text x="148" y="608" font-family="Arial, sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle" opacity="0.80" direction="rtl">נכנס לכל ארנק</text>

  <!-- ── Callout: BOTTOM-RIGHT — עמיד מים ── -->
  <line x1="552" y1="524" x2="640" y2="594" stroke="#3B82F6" stroke-width="1.2" opacity="0.55"/>
  <circle cx="552" cy="524" r="3" fill="#3B82F6" opacity="0.70"/>
  <rect x="554" y="566" width="196" height="54" rx="12" fill="white" opacity="0.08"/>
  <rect x="554" y="566" width="196" height="54" rx="12" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.30"/>
  <text x="652" y="587" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" opacity="0.90" direction="rtl">🌊 IP67 עמיד מים</text>
  <text x="652" y="608" font-family="Arial, sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle" opacity="0.80" direction="rtl">גשם, שלג, לחות</text>
</svg>
