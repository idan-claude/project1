      <path d="M-12,5 Q0,-7 12,5" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M-19,-1 Q0,-16 19,-1" fill="none" stroke="white" stroke-width="1.9" stroke-linecap="round" opacity="0.70"/>
      <path d="M-26,-7 Q0,-25 26,-7" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.44"/>
