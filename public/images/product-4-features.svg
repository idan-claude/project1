    <rect x="-190" y="-122" width="380" height="244" rx="18" fill="url(#hl4)"/>
    <rect x="-190" y="-122" width="380" height="5" rx="2" fill="white" opacity="0.13"/>
    <text x="-174" y="-98" font-family="'Arial Black','Arial',Helvetica,sans-serif" font-size="10.5" font-weight="900" fill="white" opacity="0.85">FindCard</text>
    <rect x="-104" y="-110" width="28" height="14" rx="7" fill="white" opacity="0.13"/>
    <text x="-90" y="-100" font-family="'Arial',Helvetica,sans-serif" font-size="7.5" font-weight="800" fill="white" opacity="0.75" text-anchor="middle">PRO</text>
    <line x1="-174" y1="70" x2="174" y2="70" stroke="white" stroke-width="0.4" opacity="0.10"/>
    <text x="-174" y="87" font-family="'Arial',Helvetica,sans-serif" font-size="8.5" font-weight="600" fill="white" opacity="0.50">FINDCARD PRO</text>
    <text x="-174" y="100" font-family="'Arial',Helvetica,sans-serif" font-size="7" fill="white" opacity="0.32">Apple Find My · BT 5.1 · 1.8mm · IP67 · Qi</text>
    <rect x="136" y="90" width="46" height="20" rx="5" fill="white" opacity="0.10"/>
    <text x="159" y="104" font-family="'Arial',Helvetica,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.70" text-anchor="middle">MFi ✓</text>
