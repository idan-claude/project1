    <text x="-50" y="18" font-family="'Arial Black','Arial',Helvetica,sans-serif" font-weight="900" font-size="38" fill="#BFDBFE" letter-spacing="-1" text-anchor="middle">Find</text>
    <text x="80" y="18" font-family="'Arial Black','Arial',Helvetica,sans-serif" font-weight="900" font-size="38" fill="white" letter-spacing="-1" text-anchor="middle">Card</text>

    <circle cx="-162" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-151" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-140" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-129" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-111" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-100" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-89" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-78" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-60" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-49" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-38" cy="52" r="3" fill="white" opacity="0.30"/>
    <circle cx="-27" cy="52" r="3" fill="white" opacity="0.30"/>

    <line x1="-176" y1="72" x2="176" y2="72" stroke="white" stroke-width="0.5" opacity="0.12"/>
    <text x="-176" y="89" font-family="'Arial',Helvetica,sans-serif" font-size="8.5" font-weight="700" fill="white" opacity="0.62">FINDCARD PRO</text>
    <text x="-176" y="102" font-family="'Arial',Helvetica,sans-serif" font-size="7" fill="white" opacity="0.40">Apple Find My  ·  Bluetooth 5.1  ·  1.8mm  ·  IP67  ·  8-Month Battery</text>
    <rect x="138" y="92" width="48" height="20" rx="5" fill="white" opacity="0.16"/>
    <text x="162" y="106" font-family="'Arial',Helvetica,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.80" text-anchor="middle">MFi ✓</text>
  </g>

