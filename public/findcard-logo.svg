<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#00000040"/>
    </filter>
    <radialGradient id="glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="160" fill="url(#bg)"/>
  <rect width="800" height="800" rx="160" fill="url(#glow)"/>

  <!-- Decorative circles -->
  <circle cx="680" cy="120" r="220" fill="none" stroke="white" stroke-width="2" opacity="0.07"/>
  <circle cx="680" cy="120" r="280" fill="none" stroke="white" stroke-width="1.5" opacity="0.05"/>
  <circle cx="120" cy="700" r="180" fill="none" stroke="white" stroke-width="2" opacity="0.06"/>

  <!-- Card shape -->
  <rect x="110" y="175" width="580" height="365" rx="44" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="110" y="175" width="580" height="365" rx="44" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Chip -->
  <rect x="158" y="265" width="88" height="68" rx="12" fill="url(#chipGrad)"/>
  <line x1="176" y1="265" x2="176" y2="333" stroke="#b45309" stroke-width="1" opacity="0.5"/>
  <line x1="195" y1="265" x2="195" y2="333" stroke="#b45309" stroke-width="1" opacity="0.5"/>
  <line x1="214" y1="265" x2="214" y2="333" stroke="#b45309" stroke-width="1" opacity="0.5"/>
  <line x1="233" y1="265" x2="233" y2="333" stroke="#b45309" stroke-width="1" opacity="0.5"/>
  <line x1="158" y1="285" x2="246" y2="285" stroke="#b45309" stroke-width="1" opacity="0.5"/>
  <line x1="158" y1="301" x2="246" y2="301" stroke="#b45309" stroke-width="1" opacity="0.5"/>
  <line x1="158" y1="317" x2="246" y2="317" stroke="#b45309" stroke-width="1" opacity="0.5"/>

  <!-- Contactless icon -->
  <g transform="translate(600, 260)" opacity="0.8">
    <path d="M16 44 Q32 16 48 44" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M6 54 Q32 4 58 54" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M-4 64 Q32 -8 68 64" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Card dots -->
  <text x="158" y="460" fill="rgba(255,255,255,0.5)" font-size="28" letter-spacing="10" font-family="'Courier New', monospace">•••• •••• ••••</text>

  <!-- FindCard logo text -->
  <text x="400" y="620" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="108" text-anchor="middle">
    <tspan fill="#93c5fd">Find</tspan><tspan fill="white">Card</tspan>
  </text>

  <!-- Tagline -->
  <text x="400" y="686" fill="rgba(255,255,255,0.55)" font-size="34" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="1">Never Lose What Matters</text>

  <!-- MFi badge bottom right -->
  <rect x="620" y="720" width="120" height="44" rx="22" fill="white" opacity="0.12"/>
  <text x="680" y="748" fill="white" font-size="20" font-weight="700" text-anchor="middle" font-family="Arial, sans-serif">MFi ✓</text>
</svg>
