<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jump Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }
    h1 { margin-bottom: 16px; font-size: 2rem; letter-spacing: 2px; color: #e94560; }
    #scoreBoard {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }
    #scoreBoard span { color: #f0a500; font-weight: bold; }
    canvas {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 8px;
      display: block;
    }
    #message {
      margin-top: 16px;
      font-size: 1rem;
      color: #aaa;
      height: 24px;
    }
  </style>
</head>
<body>
  <h1>JUMP!</h1>
  <div id="scoreBoard">
    Score: <span id="score">0</span> &nbsp;&nbsp; Best: <span id="best">0</span>
  </div>
  <canvas id="canvas" width="800" height="250"></canvas>
  <div id="message">Press SPACE or tap to start</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const msgEl = document.getElementById('message');

    const GROUND = canvas.height - 40;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -14;

    let state = 'idle'; // idle | playing | dead
    let score = 0;
    let best = 0;
    let speed = 5;
    let frame = 0;

    const player = {
      x: 80,
      y: GROUND,
      w: 40,
      h: 50,
      vy: 0,
      onGround: true,
      legFrame: 0,

      jump() {
        if (this.onGround) {
          this.vy = JUMP_FORCE;
          this.onGround = false;
        }
      },

      update() {
        this.vy += GRAVITY;
        this.y += this.vy;
        if (this.y >= GROUND) {
          this.y = GROUND;
          this.vy = 0;
          this.onGround = true;
        }
        if (this.onGround) this.legFrame = (this.legFrame + 0.3);
      },

      draw() {
        const px = this.x, py = this.y - this.h;
        // Body
        ctx.fillStyle = '#e94560';
        ctx.beginPath();
        ctx.roundRect(px, py + 12, this.w, this.h - 24, 6);
        ctx.fill();
        // Head
        ctx.fillStyle = '#f5cba7';
        ctx.beginPath();
        ctx.arc(px + this.w / 2, py + 8, 14, 0, Math.PI * 2);
        ctx.fill();
        // Eye
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(px + this.w / 2 + 6, py + 6, 3, 0, Math.PI * 2);
        ctx.fill();
        // Mouth smile
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(px + this.w / 2 + 4, py + 10, 5, 0.1, Math.PI - 0.1);
        ctx.stroke();
        // Legs
        const legSwing = Math.sin(this.legFrame) * 10;
        ctx.strokeStyle = '#e94560';
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(px + 12, py + this.h - 12);
        ctx.lineTo(px + 12 + (this.onGround ? legSwing : -5), py + this.h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px + 28, py + this.h - 12);
        ctx.lineTo(px + 28 + (this.onGround ? -legSwing : 5), py + this.h);
        ctx.stroke();
      }
    };

    const obstacles = [];
    const SHAPES = ['cactus', 'spike', 'box'];

    function spawnObstacle() {
      const type = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      const h = type === 'box' ? 35 + Math.random() * 25 : 40 + Math.random() * 30;
      const w = type === 'box' ? 35 + Math.random() * 20 : 20 + Math.random() * 15;
      obstacles.push({ x: canvas.width + 20, y: GROUND, w, h, type });
    }

    let nextSpawn = 90;

    function drawObstacle(o) {
      const top = o.y - o.h;
      if (o.type === 'box') {
        ctx.fillStyle = '#f0a500';
        ctx.fillRect(o.x, top, o.w, o.h);
        ctx.strokeStyle = '#c8830a';
        ctx.lineWidth = 2;
        ctx.strokeRect(o.x, top, o.w, o.h);
        // X pattern
        ctx.beginPath();
        ctx.moveTo(o.x, top); ctx.lineTo(o.x + o.w, o.y);
        ctx.moveTo(o.x + o.w, top); ctx.lineTo(o.x, o.y);
        ctx.stroke();
      } else if (o.type === 'cactus') {
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(o.x + o.w * 0.3, top, o.w * 0.4, o.h);
        ctx.fillRect(o.x, top + o.h * 0.3, o.w * 0.35, o.h * 0.35);
        ctx.fillRect(o.x + o.w * 0.65, top + o.h * 0.2, o.w * 0.35, o.h * 0.3);
      } else {
        // spike triangle
        ctx.fillStyle = '#9b59b6';
        ctx.beginPath();
        ctx.moveTo(o.x, o.y);
        ctx.lineTo(o.x + o.w / 2, top);
        ctx.lineTo(o.x + o.w, o.y);
        ctx.closePath();
        ctx.fill();
      }
    }

    function checkCollision(o) {
      const margin = 8;
      const px = player.x + margin, py = player.y - player.h + margin;
      const pw = player.w - margin * 2, ph = player.h - margin * 2;
      return px < o.x + o.w && px + pw > o.x && py < o.y && py + ph > o.y - o.h;
    }

    // Stars background
    const stars = Array.from({ length: 60 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * (GROUND - 20),
      r: Math.random() * 1.5 + 0.5,
      speed: Math.random() * 0.5 + 0.1
    }));

    function drawBackground() {
      // Sky
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Stars
      ctx.fillStyle = '#ffffff';
      for (const s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        if (state === 'playing') {
          s.x -= s.speed;
          if (s.x < 0) s.x = canvas.width;
        }
      }
      // Ground
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, GROUND, canvas.width, canvas.height - GROUND);
      ctx.fillStyle = '#e94560';
      ctx.fillRect(0, GROUND, canvas.width, 2);
    }

    function drawOverlay(title, sub) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e94560';
      ctx.font = 'bold 42px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 10);
      ctx.fillStyle = '#aaa';
      ctx.font = '18px Segoe UI';
      ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 28);
    }

    function reset() {
      player.y = GROUND;
      player.vy = 0;
      player.onGround = true;
      obstacles.length = 0;
      score = 0;
      speed = 5;
      frame = 0;
      nextSpawn = 90;
      state = 'playing';
      msgEl.textContent = 'SPACE or tap to jump';
    }

    function loop() {
      drawBackground();

      if (state === 'playing') {
        frame++;
        score = Math.floor(frame / 6);
        scoreEl.textContent = score;
        speed = 5 + Math.floor(score / 200) * 0.5;

        player.update();
        player.draw();

        nextSpawn--;
        if (nextSpawn <= 0) {
          spawnObstacle();
          nextSpawn = Math.max(50, 100 - Math.floor(score / 100) * 5) + Math.random() * 40;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
          const o = obstacles[i];
          o.x -= speed;
          drawObstacle(o);
          if (checkCollision(o)) {
            state = 'dead';
            if (score > best) { best = score; bestEl.textContent = best; }
          }
          if (o.x + o.w < 0) obstacles.splice(i, 1);
        }

      } else if (state === 'idle') {
        player.draw();
        drawOverlay('JUMP GAME', 'Press SPACE or tap to play');

      } else if (state === 'dead') {
        player.draw();
        for (const o of obstacles) drawObstacle(o);
        drawOverlay('GAME OVER', `Score: ${score} — Press SPACE or tap to retry`);
        msgEl.textContent = 'Press SPACE or tap to restart';
      }

      requestAnimationFrame(loop);
    }

    function handleInput() {
      if (state === 'idle' || state === 'dead') {
        reset();
      } else if (state === 'playing') {
        player.jump();
      }
    }

    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); handleInput(); } });
    canvas.addEventListener('click', handleInput);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(); }, { passive: false });

    loop();
  </script>
</body>
</html>
